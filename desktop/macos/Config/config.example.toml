asr_provider = "volcengine"
agentstick_api_key = ""
agentstick_cloud_url = "wss://api.xiaozhi.me/agentstick/asr/"
volcengine_api_key = "your_volcengine_access_key"
volcengine_app_key = ""  # set for old-style auth (X-Api-App-Key + X-Api-Access-Key)
llm_base_url = "https://api.openai.com/v1"
llm_api_key = "your_openai_compatible_llm_api_key"
llm_model = "gpt-5.5"
interaction_mode = "hold_to_talk"
resource_id = "volc.seedasr.sauc.duration"
asr_hotwords = "小智,AgentStick"
paired_device_ids = ""
device_theme_colors = ""
device_overlay_positions = ""
auto_enter = true
agent_capture_enabled = true
agent_sound_alerts_enabled = true
agent_bypass_approvals = false
agent_memory_enabled = true
device_sound_volume = 70
debug_audio_cache = false
# debug_audio_dir = "~/Library/Application Support/AgentStick/DebugAudio"

[output]
target = "focused_app"
transform = "original"
translation_target = "en"

# On boards with a secondary app button, side click while idle cycles:
# Text Paste -> Agent Run. On Lichuang, use the macOS menu to switch.
# Set [output].target to "agent_cli" to start in Agent Run mode.
[agent]
default = "claude" # or "codex"
cwd = "~/work/my-project"
timeout_seconds = 600

[agents.claude]
type = "claude_print"

[agents.codex]
type = "codex_exec"

# Optional per-device output overrides:
# [device.C3D8.output]
# transform = "translate"
# translation_target = "en"
#
# [device."09AF".output]
# transform = "translate"
# translation_target = "zh-Hans"

# UI language: "system" (follow macOS), "en" (English), "zh-Hans" (简体中文)
# app_language = "system"
